<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phygital Dining - Interactive Culinary Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1>Phygital Dining Suite</h1>
            <p class="subtitle">Experience Localized Tech-Driven Culinary Mastery</p>
        </div>
        
        <nav class="filter-navigation">
            <button class="filter-btn active" data-category="All">All Delicacies</button>
            <button class="filter-btn" data-category="Pakistani">Traditional Pakistani</button>
            <button class="filter-btn" data-category="Italian">Authentic Italian</button>
            <button class="filter-btn" data-category="Fast Food">Gourmet Fast Food</button>
            <button class="filter-btn" data-category="Appetizers">Starters & Appetizers</button>
        </nav>
    </header>

    <main class="menu-display-area">
        <div id="loading-indicator" class="status-message">Consulting the culinary cloud database...</div>
        
        <section id="menu-grid" class="menu-grid-layout"></section>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Phygital Dining Systems. Advanced Smart-Restaurant Capstone Infrastructure Suite.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
